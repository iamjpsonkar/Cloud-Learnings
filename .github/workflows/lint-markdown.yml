name: Lint Markdown

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Markdown linting

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint all Markdown files
        run: |
          markdownlint \
            --config .github/markdownlint.json \
            --ignore node_modules \
            '**/*.md'
        continue-on-error: true

      - name: Check for old branding
        run: |
          echo "Checking for old 'aws-learnings' branding..."
          if grep -ri "aws-learnings\|AWS-Learnings\|AWS Learnings" \
               --include="*.md" \
               --exclude-dir=".git" \
               --exclude-dir="node_modules" \
               --exclude-dir=".claude" \
               --exclude-dir=".github" \
               --exclude="CHANGELOG.md" \
               .; then
            echo "ERROR: Old branding found. Replace with 'Cloud-Learnings'."
            exit 1
          fi
          echo "No old branding found."

      - name: Check all folders have README
        run: |
          echo "Checking numbered learning directories for README.md..."
          missing=0
          # Check numbered learning content directories (00-foundations through 28-references)
          # and their immediate subsections only. Excludes lab platform internals which
          # follow a different directory convention (configs/, scripts/, api/, etc.).
          while IFS= read -r dir; do
            if [ ! -f "$dir/README.md" ]; then
              echo "MISSING README: $dir"
              missing=1
            fi
          done < <(find . -mindepth 1 -maxdepth 2 -type d \
            -not -path "./.git*" \
            -not -path "./node_modules*" \
            -not -path "./.github*" \
            -not -path "./.claude*" \
            -not -path "./assets/images*" \
            -not -path "./assets/diagrams*" \
            -not -path "./assets/prompts*" \
            -not -path "./docker/*" \
            -not -path "./40-local-cloud-lab-platform/*")
          if [ "$missing" -eq 1 ]; then
            echo "Some learning content folders are missing README.md files."
            exit 1
          fi
          echo "All learning content folders have README.md."
