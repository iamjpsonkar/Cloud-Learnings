name: New Topic Proposal
description: Propose an entirely new section or topic area
labels: ["new-topic", "discussion"]

body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new section, technology area, or significant addition to the repository scope.

  - type: input
    id: title
    attributes:
      label: Proposed topic title
      placeholder: "GitOps with FluxCD on EKS"
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: What should be covered?
      description: List the key sub-topics or files that should exist.
      placeholder: |
        - FluxCD architecture
        - Installing Flux on EKS
        - Kustomize integration
        - Secrets management with SOPS
        - Multi-cluster setup
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why add this?
      description: How does this fit the Cloud-Learnings knowledge base?
    validations:
      required: false

  - type: input
    id: suggested-path
    attributes:
      label: Suggested file path
      placeholder: "13-cicd-gitops/fluxcd.md"
    validations:
      required: false
