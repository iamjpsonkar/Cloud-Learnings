name: Bug Report
description: Report a broken link, incorrect information, or rendering issue
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue. Please fill in as much detail as possible.

  - type: input
    id: file
    attributes:
      label: File path
      description: Which file contains the issue? (e.g., `05-aws/04-compute/ec2.md`)
      placeholder: "05-aws/04-compute/ec2.md"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Issue type
      options:
        - Broken link
        - Incorrect information
        - Missing image
        - Rendering / formatting issue
        - Typo or grammar
        - Outdated content
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong? Be as specific as possible.
      placeholder: "The example command on line 45 uses --flag that no longer exists in AWS CLI v2."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected content
      description: What should it say or show instead?
    validations:
      required: false

  - type: input
    id: reference
    attributes:
      label: Reference (optional)
      description: Link to official documentation or source that confirms the correct information
    validations:
      required: false
