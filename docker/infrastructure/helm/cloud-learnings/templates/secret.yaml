apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloud-learnings.fullname" . }}-secrets
  labels:
    {{- include "cloud-learnings.labels" . | nindent 4 }}
type: Opaque
stringData:
  # WARNING: Replace with real secrets via Vault, Sealed Secrets, or external-secrets
  # NEVER commit real credentials to git
  database-url: "postgresql://appuser:CHANGE_ME@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
