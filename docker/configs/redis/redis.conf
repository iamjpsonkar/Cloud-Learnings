# Redis configuration for Cloud-Learnings lab
# This file is used alongside the command-line password argument

# Persistence
appendonly yes
appendfilename "appendonly.aof"

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Slow log (log queries slower than 10ms)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Database count
databases 16

# TCP keepalive
tcp-keepalive 300

# Protect mode (disabled since we use password)
protected-mode no
