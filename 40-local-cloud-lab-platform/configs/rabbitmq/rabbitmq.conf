# RabbitMQ configuration for local lab platform
# All settings are dev-only — not suitable for production

# Network
listeners.tcp.default = 5672

# Management plugin
management.tcp.port = 15672
management.load_definitions = /etc/rabbitmq/definitions.json

# Logging
log.console = true
log.console.level = info

# Resource limits (conservative for local use)
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 1GB

# Default vhost and user are set via env RABBITMQ_DEFAULT_USER, RABBITMQ_DEFAULT_PASS
