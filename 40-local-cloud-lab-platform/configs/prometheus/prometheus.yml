global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'local-cloud-lab'

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    labels:
      service: prometheus

  - job_name: 'lab-api'
    static_configs:
      - targets: ['api:4567']
    metrics_path: '/metrics'
    labels:
      service: lab-api

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    labels:
      service: node-exporter

  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: '/minio/v2/metrics/cluster'
    labels:
      service: minio

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: '/metrics'
    labels:
      service: traefik

  - job_name: 'docker-containers'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: label
            values: ['com.cloudlabs.project=local-cloud-lab']
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_label_com_cloudlabs_service]
        target_label: service
