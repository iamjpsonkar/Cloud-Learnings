id: postgres-basics
title: "PostgreSQL Basics: SQL Operations and Administration"
description: >
  Practice PostgreSQL fundamentals including DDL, DML, transactions, indexes,
  and basic administration. Connect to the local PostgreSQL instance running
  in Docker and perform real SQL operations.

difficulty: beginner
estimated_time: "45 minutes"
category: databases

prerequisites:
  - "Data services running: make start-data"
  - "psql or any SQL client (DBeaver, TablePlus, DataGrip work too)"

tools_required:
  - psql

docker_profiles:
  - data

ports_used:
  - 5432

learning_objectives:
  - Connect to PostgreSQL and navigate databases and schemas
  - Write CREATE TABLE, INSERT, SELECT, UPDATE, DELETE statements
  - Use WHERE, ORDER BY, GROUP BY, JOIN
  - Create indexes and understand their impact
  - Use transactions with BEGIN, COMMIT, ROLLBACK
  - Run EXPLAIN to understand query execution plans

tasks:
  - id: connect
    description: "Connect to the PostgreSQL database using psql"
    hints:
      - "Connection string: psql -h localhost -p 5432 -U labuser -d labdb"
      - "Password: labpassword123 (from .env)"
      - "Or use environment: PGPASSWORD=labpassword123 psql -h localhost -p 5432 -U labuser -d labdb"

  - id: explore-schema
    description: "List tables, describe the products table, and view the sample data"
    hints:
      - "List tables: \\dt"
      - "Describe a table: \\d products"
      - "View data: SELECT * FROM products;"

  - id: write-queries
    description: "Write and run 3 queries: count products by category, find orders over $100, and a JOIN between products and orders"
    hints:
      - "Count by category: SELECT category, COUNT(*) FROM products GROUP BY category;"
      - "High-value orders: SELECT * FROM orders WHERE total > 100;"
      - "JOIN: SELECT p.name, o.quantity, o.total FROM orders o JOIN products p ON o.product_id = p.id;"

  - id: create-table
    description: "Create a new table 'customers' with appropriate columns"
    hints:
      - "Include: id SERIAL PRIMARY KEY, name VARCHAR(255), email VARCHAR(255) UNIQUE, created_at TIMESTAMP DEFAULT NOW()"
      - "INSERT at least 2 customers"

  - id: transaction
    description: "Demonstrate a transaction: update an order status to 'shipped', then rollback the change"
    hints:
      - "BEGIN; UPDATE orders SET status='shipped' WHERE id=1; SELECT * FROM orders WHERE id=1; ROLLBACK;"
      - "After ROLLBACK, verify the status was not changed permanently"

  - id: create-index
    description: "Create an index on the orders.status column and verify it's used with EXPLAIN"
    hints:
      - "CREATE INDEX idx_orders_status ON orders(status);"
      - "EXPLAIN SELECT * FROM orders WHERE status='pending';"
      - "Look for 'Index Scan' in the output"

validation_steps:
  - "psql can connect to localhost:5432 with labuser credentials"
  - "SELECT COUNT(*) FROM products returns 5 (or more if you added data)"
  - "customers table exists with at least 2 rows"
  - "Index idx_orders_status exists"

grading_rules:
  - check: "PGPASSWORD=labpassword123 psql -h localhost -p 5432 -U labuser -d labdb -c 'SELECT 1' -q -t | grep -q 1"
    points: 15
  - check: "PGPASSWORD=labpassword123 psql -h localhost -p 5432 -U labuser -d labdb -c '\\dt' | grep -q customers"
    points: 25
  - check: "PGPASSWORD=labpassword123 psql -h localhost -p 5432 -U labuser -d labdb -c 'SELECT COUNT(*) FROM customers' -t | grep -qE '[2-9]|[0-9]{2,}'"
    points: 25
  - check: "PGPASSWORD=labpassword123 psql -h localhost -p 5432 -U labuser -d labdb -c \"SELECT COUNT(*) FROM pg_indexes WHERE indexname='idx_orders_status'\" -t | grep -q 1"
    points: 35

cleanup_steps:
  - "PGPASSWORD=labpassword123 psql -h localhost -p 5432 -U labuser -d labdb -c 'DROP TABLE IF EXISTS customers;' || true"
  - "PGPASSWORD=labpassword123 psql -h localhost -p 5432 -U labuser -d labdb -c 'DROP INDEX IF EXISTS idx_orders_status;' || true"

related_docs:
  - "../../../18-databases/README.md"

related_cloud_services:
  - "AWS RDS for PostgreSQL"
  - "AWS Aurora PostgreSQL"
  - "Azure Database for PostgreSQL"
  - "GCP Cloud SQL for PostgreSQL"
  - "GCP AlloyDB"

local_only: true
cost_warning: null
safety_warning: null
