# docker-compose.azure-local.yml — Azurite (Azure storage emulator)
# Emulates: Blob Storage, Queue Storage, Table Storage
# ~256 MB RAM
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.azure-local.yml \
#     --profile core --profile azure-local up -d
#
# Connection string (well-known dev account, always the same):
#   DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;
#   AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;
#   BlobEndpoint=http://localhost:10000/devstoreaccount1;
#   QueueEndpoint=http://localhost:10001/devstoreaccount1;
#   TableEndpoint=http://localhost:10002/devstoreaccount1;
#
# Python SDK example:
#   from azure.storage.blob import BlobServiceClient
#   client = BlobServiceClient.from_connection_string(os.environ["AZURITE_CONNECTION_STRING"])

name: local-cloud-lab

networks:
  cloud-lab-network:
    external: true

volumes:
  azurite-data:
    name: cloud-lab-azurite-data
    labels:
      com.cloudlabs.project: local-cloud-lab

services:

  # ─────────────────────────────────────────────
  # Azurite — Azure Storage emulator
  # Blob:  http://localhost:10000/devstoreaccount1
  # Queue: http://localhost:10001/devstoreaccount1
  # Table: http://localhost:10002/devstoreaccount1
  # ─────────────────────────────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.28.0
    container_name: cloud-lab-azurite
    profiles: [azure-local]
    command: >
      azurite
      --blobHost 0.0.0.0
      --blobPort 10000
      --queueHost 0.0.0.0
      --queuePort 10001
      --tableHost 0.0.0.0
      --tablePort 10002
      --location /data
      --debug /data/debug.log
      --loose
    ports:
      - "${AZURITE_PORT:-10000}:10000"
      - "${AZURITE_QUEUE_PORT:-10001}:10001"
      - "${AZURITE_TABLE_PORT:-10002}:10002"
    volumes:
      - azurite-data:/data
    networks:
      cloud-lab-network:
        ipv4_address: 172.20.0.51
    labels:
      com.cloudlabs.project: local-cloud-lab
      com.cloudlabs.service: azurite
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
